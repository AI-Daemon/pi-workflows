# create-workflow.yml — Scaffold for creating new DAWE workflows
#
# A minimal template workflow. Fill in node instructions,
# schemas, and transitions to build your workflow.

version: '1.0'
workflow_name: create-workflow
description: Scaffold for authoring new DAWE workflows.
initial_node: gather_requirements

nodes:
  gather_requirements:
    type: llm_decision
    instruction: 'TODO'
    required_schema:
      workflow_name: string
      description: string
      version: string
    transitions:
      - condition: 'true'
        target: design_nodes

  design_nodes:
    type: llm_task
    instruction: 'TODO'
    completion_schema:
      status: string
    context_keys:
      - workflow_name
      - description
      - version
    transitions:
      - condition: 'true'
        target: generate_yaml

  generate_yaml:
    type: llm_task
    instruction: 'TODO'
    completion_schema:
      status: string
    context_keys:
      - workflow_name
      - description
      - version
    transitions:
      - condition: 'true'
        target: done

  done:
    type: terminal
    status: success
    message: 'Workflow {{payload.workflow_name}} created.'
