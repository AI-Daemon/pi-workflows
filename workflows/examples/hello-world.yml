# Example: Hello World Workflow
# A minimal workflow demonstrating the DAWE schema structure.

version: '1.0'
workflow_name: 'hello-world'
description: 'A minimal example workflow for testing.'
initial_node: 'greet'

nodes:
  greet:
    type: 'llm_task'
    instruction: 'Say hello to the user.'
    transitions:
      - condition: 'true'
        target: 'done'

  done:
    type: 'llm_task'
    instruction: 'Workflow complete.'
    transitions: []
