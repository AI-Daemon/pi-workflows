# Invalid: max_visits must be at least 1 — negative values are not allowed.

version: '2.0'
workflow_name: max-visits-negative
description: Invalid workflow with max_visits set to a negative number.
initial_node: start

nodes:
  start:
    type: system_action
    runtime: bash
    command: 'echo hello'
    max_visits: -1
    transitions:
      - condition: 'true'
        target: done

  done:
    type: terminal
    status: success
