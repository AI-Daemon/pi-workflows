version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps)'
    groups:
      # Group 1: Vitest & its companion packages
      vitest-group:
        patterns:
          - 'vitest'
          - '@vitest/*'

      # Group 2: ESLint ecosystem + types
      eslint-group:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - '@types/eslint*'

      # Group 3: GitHub Actions packages
      actions-group:
        patterns:
          - '@actions/*'

      # Group 4: Catch-all for safe updates (minor & patch only)
      # Major bumps for ungrouped packages get their own dedicated PR
      safe-updates:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'
      - 'ci'
    commit-message:
      prefix: 'chore(ci):'
    groups:
      github-actions:
        patterns:
          - '*'
